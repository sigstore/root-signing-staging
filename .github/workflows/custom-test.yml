name: root-signing repository tests with a Sigstore client

on:
  workflow_call:
    inputs:
      metadata_url:
        description: "URL of the sigstore staging TUF repository to test"
        required: true
        type: string

permissions:
  id-token: 'write' # For signing with the GitHub workflow identity

env:
  STAGING_URL: ${{ inputs.metadata_url }}
  IDENTITY: ${{ github.server_url }}/${{ github.repository }}/.github/workflows/custom-test.yml@${{ github.ref }}

jobs:
  sigstore-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Install sigstore-python
        run: pip install sigstore

      - name: Trust the Sigstore instance
        run: |
          curl -o root.json ${STAGING_URL}/1.root.json
          python -m sigstore --instance ${STAGING_URL} trust-instance root.json

      - name: Test published repository with sigstore-python
        run: |
          touch artifact
          # sign, then verify using this workflows oidc identity
          python -m sigstore -vv --instance ${STAGING_URL} \
              sign --bundle artifact.sigstore.json artifact
          python -m sigstore --instance ${STAGING_URL} \
              verify github --cert-identity $IDENTITY --bundle artifact.sigstore.json artifact

          # sign again with rekor v1 for sigstore-js
          python -m sigstore -vv --instance ${STAGING_URL} \
              sign --rekor-version=1 --bundle artifact-rekor1.sigstore.json artifact

      - name: Upload the bundle for other clients to verify
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle
          path: artifact*.sigstore.json
          overwrite: true

  cosign:
    runs-on: ubuntu-latest
    steps:
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Download initial root
        run: curl -o root.json ${STAGING_URL}/1.root.json

      - name: Test published repository with cosign
        run: |
          touch artifact

          # initialize from the published repository
          cosign initialize --root root.json --mirror ${STAGING_URL}

          # sign, then verify using this workflows oidc identity
          cosign sign-blob \
              --yes \
              --bundle bundle.json \
              artifact

          cosign verify-blob \
              --use-signed-timestamps=true \
              --certificate-identity $IDENTITY \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --bundle bundle.json \
              artifact

  cosign-old-version:
    runs-on: ubuntu-latest
    steps:
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v2.2.0"

      - name: Download initial root
        run: curl -o root.json ${STAGING_URL}/1.root.json

      - name: Test published repository with cosign 2.2
        run: |
          touch artifact

          # initialize from the published repository
          cosign initialize --root root.json --mirror ${STAGING_URL}

          # sign, then verify using this workflows oidc identity
          cosign sign-blob \
              --yes \
              --fulcio-url https://fulcio.sigstage.dev \
              --oidc-issuer https://oauth2.sigstage.dev/auth \
              --rekor-url https://rekor.sigstage.dev \
              --bundle bundle.json \
              artifact

          cosign verify-blob \
              --certificate-identity $IDENTITY \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --bundle bundle.json \
              artifact

  sigstore-go:
    runs-on: ubuntu-latest
    needs: [sigstore-python]
    steps:
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 'stable'

      - name: Install sigstore-go
        run: go install github.com/sigstore/sigstore-go/examples/sigstore-go-verification@latest

      - name: Download initial root
        run: curl -o root.json ${STAGING_URL}/1.root.json

      - name: Download bundle to verify
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bundle

      - name: Test published repository with sigstore-go
        run: |
          touch artifact

          ~/go/bin/sigstore-go-verification \
              -tufRootURL $STAGING_URL \
              -tufTrustedRoot root.json \
              -expectedSAN $IDENTITY \
              -expectedIssuer https://token.actions.githubusercontent.com \
              -artifact artifact \
              artifact.sigstore.json

  sigstore-js:
    runs-on: ubuntu-latest
    needs: [sigstore-python]
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      - name: Install sigstore-js
        run: npm install -g @sigstore/cli

      - name: Download initial root
        run: curl -o root.json ${STAGING_URL}/1.root.json

      - name: Download bundle to verify
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bundle

      - name: Test published repository with sigstore-js
        run: |
          touch artifact

          sigstore verify \
              --tuf-mirror-url $STAGING_URL \
              --tuf-root-path root.json \
              --certificate-identity-uri $IDENTITY \
              --certificate-issuer https://token.actions.githubusercontent.com \
              --blob-file=artifact \
              artifact-rekor1.sigstore.json

  sigstore-java:
    runs-on: ubuntu-latest
    needs: [sigstore-python]
    steps:
      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: "sigstore/sigstore-java"
          fetch-tags: true
          fetch-depth: 0
          persist-credentials: false

      - name: Build cli from latest release tag, unpack distribution
        run: |
          git checkout $(git describe --tags --match="v[0-9]*" --abbrev=0 HEAD)
          ./gradlew :sigstore-cli:build
          tar -xvf sigstore-cli/build/distributions/sigstore-cli-*.tar --strip-components 1

      - name: Download bundle to verify
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bundle

      - name: Test published repository with sigstore-java
        run: |
          touch artifact

          bin/sigstore-cli verify-bundle \
              --staging-with-tuf-url-override $STAGING_URL \
              --bundle artifact.sigstore.json \
              --certificate-identity $IDENTITY \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              artifact

  sigstore-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: "sigstore/sigstore-rust"
          fetch-tags: true
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout latest release tag
        run: |
          # examples are not available on crates.io: use git checkout
          git checkout $(git describe --tags --match="sigstore-verify-v[0-9]*" --abbrev=0 HEAD)

      - name: Install Rust toolchain
        run: rustup toolchain install

      - name: Download initial root
        run: curl -o root.json ${STAGING_URL}/1.root.json

      - name: Build required examples
        run: |
          cargo build -p sigstore-trust-root --example trust-instance -p sigstore-sign --example sign_blob -p sigstore-verify --example verify_bundle

      - name: Trust the Sigstore instance
        run: |
          ./target/debug/examples/trust-instance --instance ${STAGING_URL} root.json

      - name: Test published repository (sign and verify)
        run: |
          touch artifact
          ./target/debug/examples/sign_blob --instance ${STAGING_URL} -o artifact.sigstore.json artifact
          ./target/debug/examples/verify_bundle \
              --instance ${STAGING_URL} \
              --certificate-identity $IDENTITY \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              artifact \
              artifact.sigstore.json


